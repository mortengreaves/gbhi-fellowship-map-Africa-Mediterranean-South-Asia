<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GBHI - Global Fellowship Networks</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #1a2a4a;
            height: 100vh;
            overflow: hidden;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }
        
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .gbhi-logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #fff 0%, #fdbb4d 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #1a2a6c;
        }
        .header h1 { font-size: 18px; color: white; }
        .header h1 span { color: #fdbb4d; }
        .header p { color: rgba(255,255,255,0.7); font-size: 10px; margin-top: 2px; }
        
        /* SIMPLE NAVIGATION BUTTONS - THESE WILL WORK */
        .nav-buttons {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
        }
        .nav-btn {
            padding: 8px 20px;
            border: 2px solid #fdbb4d;
            border-radius: 30px;
            background: rgba(0,0,0,0.8);
            color: #fdbb4d;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .nav-btn:hover {
            background: #fdbb4d;
            color: #1a2a6c;
            transform: scale(1.05);
        }
        
        .main-container { height: calc(100vh - 72px); position: relative; }
        .map-container { height: 100%; width: 100%; position: relative; background: #0a1a2a; }
        #worldMap { height: 100%; width: 100%; background: #0a1a2a; }
        
        .legend-panel {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-size: 11px;
            z-index: 1000;
            border-left: 3px solid #fdbb4d;
        }
        .stats-badge {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            color: #fdbb4d;
            font-size: 10px;
            z-index: 1000;
        }
        .bubble-popup .leaflet-popup-content-wrapper {
            background: #1a1a2e;
            color: white;
            border-radius: 10px;
            border: 1px solid #fdbb4d;
        }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 10px; }
            .nav-buttons { justify-content: center; }
            .nav-btn { padding: 5px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-section">
            <div class="gbhi-logo"><i class="fas fa-brain"></i></div>
            <div>
                <h1>Global Brain Health Institute <span>| GBHI</span></h1>
                <p>Global Fellowship Networks • Click a button to explore</p>
            </div>
        </div>
        <div class="nav-buttons">
            <a class="nav-btn" href="south-asia.html"><i class="fas fa-map-marker-alt"></i> 🌏 South Asia</a>
            <a class="nav-btn" href="mediterranean.html"><i class="fas fa-map-marker-alt"></i> 🌊 Mediterranean</a>
            <a class="nav-btn" href="africa.html"><i class="fas fa-map-marker-alt"></i> 🌍 Africa</a>
        </div>
    </div>
    
    <div class="main-container">
        <div class="map-container">
            <div id="worldMap"></div>
            
            <div class="legend-panel">
                <h4><i class="fas fa-chart-line"></i> Policy Document Volume</h4>
                <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;">
                    <div><span style="display:inline-block; width:8px; height:8px; background:#fdbb4d; border-radius:50%;"></span> &lt;10</div>
                    <div><span style="display:inline-block; width:14px; height:14px; background:#fdbb4d; border-radius:50%;"></span> 10-50</div>
                    <div><span style="display:inline-block; width:22px; height:22px; background:#fdbb4d; border-radius:50%;"></span> 50-150</div>
                    <div><span style="display:inline-block; width:35px; height:35px; background:#fdbb4d; border-radius:50%;"></span> 150-300</div>
                    <div><span style="display:inline-block; width:48px; height:48px; background:#fdbb4d; border-radius:50%;"></span> 300+</div>
                </div>
                <p style="margin-top: 8px;"><i class="fas fa-hand-pointer"></i> Click the buttons above to explore fellowship networks</p>
            </div>
            
            <div class="stats-badge">
                <i class="fas fa-database"></i> 1,469 docs | 59 countries | 3 fellowship networks
            </div>
        </div>
    </div>
    
    <script>
        window.addEventListener('load', function() {
            var worldMap = L.map('worldMap').setView([20, 0], 2);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OSM & CartoDB',
                maxZoom: 6,
                minZoom: 2
            }).addTo(worldMap);
            
            function getRadius(docs) {
                if (docs >= 300) return 48;
                if (docs >= 150) return 38;
                if (docs >= 50) return 28;
                if (docs >= 20) return 18;
                if (docs >= 10) return 13;
                return 8;
            }
            
            var countries = [
                { lat: 37.0902, lng: -95.7129, name: "USA", docs: 516 },
                { lat: 56.1304, lng: -106.3468, name: "Canada", docs: 56 },
                { lat: 55.3781, lng: -3.4360, name: "UK", docs: 262 },
                { lat: 51.1657, lng: 10.4515, name: "Germany", docs: 92 },
                { lat: 40.4637, lng: -3.7492, name: "Spain", docs: 71 },
                { lat: 46.2276, lng: 2.2137, name: "France", docs: 41 },
                { lat: 35.8617, lng: 104.1954, name: "China", docs: 100 },
                { lat: 25.2744, lng: 133.7751, name: "Australia", docs: 92 },
                { lat: 20.5937, lng: 78.9629, name: "India", docs: 15 },
                { lat: -14.2350, lng: -51.9253, name: "Brazil", docs: 20 },
                { lat: -1.2864, lng: 36.8172, name: "Kenya", docs: 5 },
                { lat: -30.5595, lng: 22.9375, name: "South Africa", docs: 8 }
            ];
            
            for (var i = 0; i < countries.length; i++) {
                var c = countries[i];
                L.circleMarker([c.lat, c.lng], {
                    radius: getRadius(c.docs),
                    fillColor: "#fdbb4d",
                    color: "#ffffff",
                    weight: 2,
                    opacity: 0.8,
                    fillOpacity: 0.6
                }).addTo(worldMap).bindPopup('<div style="text-align:center;"><strong style="color:#fdbb4d;">' + c.name + '</strong><br><span style="font-size:18px;">' + c.docs + '</span><br>policy documents</div>', { className: 'bubble-popup' });
            }
            
            L.circleMarker([50.8503, 4.3517], {
                radius: 28,
                fillColor: "#fdbb4d",
                color: "#ffffff",
                weight: 2,
                opacity: 0.8,
                fillOpacity: 0.6
            }).addTo(worldMap).bindPopup('<div style="text-align:center;"><strong style="color:#fdbb4d;">European Union</strong><br><span style="font-size:18px;">47</span><br>policy documents</div>', { className: 'bubble-popup' });
            
            console.log("World map loaded — use the buttons above to explore regions");
        });
    </script>
</body>
</html>
